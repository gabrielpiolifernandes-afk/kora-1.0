<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>KORA</title>
  <link rel="stylesheet" href="../assets/css/app.css">
  <style>
    .device::before { background: transparent; }
    .status-bar--dark { color: var(--bg); }
  </style>
</head>
<body>

<div class="device">
  <div class="device__screen" style="background: var(--kora-black)">

    <div class="status-bar status-bar--dark">
      <span>9:41</span>
      <span class="status-bar__icons"><span>●●●</span> <span>●</span></span>
    </div>

    <div class="splash">
      <div>
        <div class="splash__brand">KORA</div>
        <div style="font-size: 11px; letter-spacing: .25em; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 24px">Soluções com IA</div>
        <div class="splash__product editorial">
          Inteligência <em>financeira</em>
        </div>
        <div style="margin-top: 28px">
          <a href="login.html" class="btn btn--primary" style="background: var(--accent); width: auto; display: inline-flex; padding: 14px 36px">Entrar</a>
        </div>
        <div style="margin-top: 16px">
          <a href="login.html" class="muted" style="color: rgba(255,255,255,.65); font-size: 13px">Criar minha conta</a>
        </div>
      </div>

      <div class="splash__quote">
        “Mais do que controlar dinheiro.<br>Entender comportamento financeiro.”
      </div>
    </div>

  </div>
</div>

</body>
</html>
